<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thread edit</title>
</head>
<body>
    <h1>Thread edit</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
        <a href="{% url 'threaddetail' thread.pk %}">Cancel</a>
    </form>
    <form method="post" action="{% url 'threaddelete' thread.pk %}">
        {% csrf_token %}
        <button type="submit" onclick="return confirm('Delete this thread?')">Delete</button>
    </form>
</body>
</html>
