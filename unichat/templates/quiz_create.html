{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 600px;">
  <a href="{% url 'course_detail' course.pk %}" class="text-decoration-none">← Back to course</a>
  <h2 class="mt-3">Add Quiz to {{ course.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger small mt-1">{{ field.errors }}</div>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'course_detail' course.pk %}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
