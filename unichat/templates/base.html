{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unichat</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo" onclick="openNav()" style="cursor: pointer;">
                <div class="logo-mark">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 3.5C2 2.67 2.67 2 3.5 2h8C12.33 2 13 2.67 13 3.5v6c0 .83-.67 1.5-1.5 1.5H9l-2 2-2-2H3.5C2.67 11 2 10.33 2 9.5v-6z" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
                        <circle cx="5.5" cy="6.5" r="0.8" fill="#fff"/>
                        <circle cx="7.5" cy="6.5" r="0.8" fill="#fff"/>
                        <circle cx="9.5" cy="6.5" r="0.8" fill="#fff"/>
                    </svg>
                </div>
                <a href="{% url 'home' %}"></a>
            </div>
            <ul>
                <button class="btn-login"><a href="#">Log in</a></button>
                <button class="btn-signup"><a href="#">Sign up</a></button>
            </ul>
        </div>
    </nav>

    <div id="mysideNav" class="sideNav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="{% url 'home' %}">Home Page</a>
        <a href="{% url 'chat' %}">Chat Page</a>
        <a href="{% url 'course_list' %}">Courses</a>
    </div>

    {% block content %}
    {% endblock %}

    <script>
        function openNav() {
            document.getElementById("mysideNav").style.width = "250px";
        }
        function closeNav() {
            document.getElementById("mysideNav").style.width = "0";
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
