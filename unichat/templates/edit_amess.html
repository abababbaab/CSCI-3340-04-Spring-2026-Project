<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit message</title>
</head>
<body>
    <h1>Edit message</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
        <a href="{% url 'assignmentdetail' message.assignment.pk %}">Cancel</a>
    </form>
    <form method="POST" action="{% url 'amessdelete' message.pk %}">
        {% csrf_token %}
        <button type="submit" onclick="return confirm('Delete this message?')">Delete</button>
    </form>
</body>
</html>
