<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Detail</title>
</head>
<body>
  <h1>{{ quiz.title }}</h1>
<h2>chat</h2>
{% for msg in messagess %}
    <p><strong>{{ msg.author }}</strong>: {{ msg.body }}</p>
{% endfor %}
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Reply</button>
</form>
</body>
</html>
