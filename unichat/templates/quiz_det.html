{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 700px;">
  <a href="javascript:history.back()" class="text-decoration-none">← Back</a>
  <div class="card mt-3">
    <div class="card-body">
      <h2>{{ assignment.title }}</h2>
      <p class="text-muted">Created by {{ assignment.created_by }} on {{ assignment.created_at|date:"F d, Y" }}</p>
    </div>
  </div>
</div>
{% endblock %}
