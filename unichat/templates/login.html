{% extends 'baseold.html' %}
{% load static %}

{% block title %}Login{% endblock %}
{% block nav_buttons %}{% endblock %}

{% block content %}
<div id="container" style="
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #000;
    padding: 2rem;
">
    <div class="form-wrap" style="
        width: 100%;
        max-width: 600px;
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 2.5rem;
        color: #fff;
        text-align: center;
    ">
        <h2 style="color: #fff; margin-bottom: 1.5rem;">Log In</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="
                width: 100%;
                padding: 0.6rem;
                margin-top: 1rem;
                background: #fff;
                color: #000;
                border: none;
                border-radius: 6px;
                font-weight: 600;
                cursor: pointer;
            ">Log In</button>
        </form>
        <a href="{% url 'register' %}" style="
            display: block;
            margin-top: 1rem;
            color: #aaa;
            font-size: 0.875rem;
            text-decoration: none;
        ">Don't have an account? Sign up</a>
    </div>
</div>
{% endblock %}
