{% extends 'home.html' %}
{% load static %}

{% block title %}Login{% endblock %}
{% block nav_buttons %}{% endblock %}

{% block content %}
<div id="container">
    <div class="form-wrap">
        <h2>Log In</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Log In</button>
        </form>
        <a href="{% url 'register' %}">Don't have an account? Sign up</a>
    </div>
</div>
{% endblock %}
