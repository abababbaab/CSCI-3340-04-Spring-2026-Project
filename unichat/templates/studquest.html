{% extends 'base.html' %}

{% block title %} Student Questions {% endblock %}

{% block header %}
<h1>Student Questions</h1>

{% for thread in threads %}
    <div>
        <a href="{% url 'threaddetail' thread.pk %}">{{ thread.title }}</a>
        <small>by {{ thread.created_by }} - {{ thread.created_at }}</small>
    </div>
    <hr>
{% endfor %}
<a href="{% url 'threadcreate' %}">New Thread</a>



{% endblock %}
