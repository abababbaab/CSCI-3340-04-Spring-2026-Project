{% extends 'home.html' %}

{% block title %}Register{% endblock %}
{% block nav_buttons %}{% endblock %}

{% block content %}

<div id="container">
    <div class="form-wrap">
        <h2>Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <a href="{% url 'login' %}">Already have an account? Log in</a>
    </div>
</div>

{% endblock %}
